<template>
    <div class="prjcs-app">
        <div class="prjcs-topstripe"></div>

        <!-- HERO -->
        <header class="prjcs-hero">
            <div class="prjcs-hero__bg"></div>
            <div class="prjcs-hero__row">
                <div class="prjcs-emblem">
                    <svg class="prjcs-flag" viewBox="0 0 90 60" xmlns="http://www.w3.org/2000/svg" aria-label="Flag of South Africa" focusable="false">
                        <rect width="90" height="30" fill="#de3831"></rect>
                        <rect y="30" width="90" height="30" fill="#002395"></rect>
                        <polygon points="0,0 0,60 39,30" fill="#ffb915"></polygon>
                        <polygon points="0,8 0,52 30,30" fill="#000000"></polygon>
                        <path d="M90,30 L34,30 L0,0 M34,30 L0,60" fill="none" stroke="#ffffff" stroke-width="20" stroke-linejoin="round"></path>
                        <path d="M90,30 L34,30 L0,0 M34,30 L0,60" fill="none" stroke="#007a4d" stroke-width="12" stroke-linejoin="round"></path>
                    </svg>
                </div>
                <div class="prjcs-hero__text">
                    <p class="prjcs-hero__eyebrow">South Africa &middot; Public Services</p>
                    <h1 class="prjcs-hero__title">ID Holiday Checker</h1>
                    <p class="prjcs-hero__sub">Validate your South African ID and discover the public &amp; banking holidays of your birth year.</p>
                </div>
            </div>
        </header>

        <!-- STEPPER -->
        <nav class="prjcs-steps" role="tablist">
            <template for:each={tabItems} for:item="t">
                <button key={t.id} data-id={t.id} class={t.cls} onclick={handleTabClick}
                    disabled={t.disabled} role="tab" aria-selected={t.active} type="button">
                    <span class="prjcs-step__dot">{t.num}</span>
                    <span class="prjcs-step__label">{t.label}</span>
                </button>
            </template>
        </nav>

        <!-- BODY -->
        <section class="prjcs-body">
            <template if:true={isLoading}>
                <div class="prjcs-loading">
                    <lightning-spinner alternative-text="Checking ID number..." size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- TAB 1 - SEARCH (US1) -->
            <template if:true={isTab1}>
                <div class="prjcs-pane">
                    <div class="prjcs-searchgrid">
                        <div class="prjcs-searchgrid__form">
                            <div class="prjcs-note">
                                <lightning-icon icon-name="utility:info" size="x-small" class="prjcs-note__icon"></lightning-icon>
                                <p>Enter your 13-digit South African ID number to validate it, decode your date of birth, gender and citizenship, and view the public &amp; banking holidays for your year of birth.</p>
                            </div>

                            <label class="prjcs-label" for="prjcs-id-input">South African ID Number</label>
                            <input id="prjcs-id-input" class="prjcs-input" type="text" inputmode="numeric"
                                maxlength="13" autocomplete="off" placeholder="0000000000000"
                                value={idNumber} oninput={handleIdChange} onkeyup={handleKeyUp} />

                            <template if:true={showInlineError}>
                                <p class="prjcs-msg prjcs-msg_error" role="alert">
                                    <lightning-icon icon-name="utility:error" size="xx-small" variant="error"></lightning-icon>
                                    {inlineError}
                                </p>
                            </template>
                            <template if:true={showValidHint}>
                                <p class="prjcs-msg prjcs-msg_ok" role="status">
                                    <lightning-icon icon-name="utility:success" size="xx-small" variant="success"></lightning-icon>
                                    Valid &mdash; ready to search.
                                </p>
                            </template>

                            <div class="prjcs-actions">
                                <button class="prjcs-btn prjcs-btn_primary" disabled={isSearchDisabled} onclick={handleSearch} type="button">Check Holidays</button>
                                <button class="prjcs-btn prjcs-btn_ghost" onclick={handleClear} type="button">Clear</button>
                                <button class="prjcs-textbtn" onclick={handleUseSample} type="button">Check sample ID</button>
                                <button class="prjcs-iconbtn" onclick={toggleSamples} type="button" title="Show sample IDs to test" aria-label="Show sample IDs to test">
                                    <lightning-icon icon-name="utility:info" size="x-small"></lightning-icon>
                                </button>
                            </div>

                            <template if:true={showValidHint}>
                                <div class="prjcs-ai prjcs-ai_compact">
                                    <div class="prjcs-ai__bar">
                                        <span class="prjcs-ai__spark">
                                            <svg class="prjcs-ai__sparksvg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="currentColor"></path></svg>
                                        </span>
                                        <button class="prjcs-ai__btn" onclick={handleExplain} disabled={isExplainLoading} type="button">
                                            <svg class="prjcs-ai__btnstar" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="currentColor"></path></svg>
                                            <template if:true={isExplainLoading}>Working&hellip;</template>
                                            <template if:false={isExplainLoading}>Explain my ID</template>
                                        </button>
                                    </div>
                                    <template if:true={isExplainLoading}>
                                        <div class="prjcs-ai__skeleton"></div>
                                    </template>
                                    <template if:true={idExplain}>
                                        <lightning-formatted-rich-text value={idExplainHtml} class="prjcs-ai__text"></lightning-formatted-rich-text>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <aside class="prjcs-aside">
                            <p class="prjcs-aside__eyebrow">What you'll get</p>
                            <ul class="prjcs-features">
                                <li><span class="prjcs-features__ic"><lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon></span><span>Instant SA ID validation with the Luhn checksum</span></li>
                                <li><span class="prjcs-features__ic"><lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon></span><span>Your date of birth, gender and citizenship decoded</span></li>
                                <li><span class="prjcs-features__ic"><lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon></span><span>Public &amp; banking holidays for your year of birth</span></li>
                                <li><span class="prjcs-features__ic"><lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon></span><span>Each search securely recorded and counted</span></li>
                            </ul>
                        </aside>
                    </div>

                    <template if:true={showSamples}>
                        <div class="prjcs-samples">
                            <div class="prjcs-samples__head">
                                <h3 class="prjcs-samples__title">Sample IDs &mdash; click a row to check</h3>
                                <button class="prjcs-textbtn" onclick={toggleSamples} type="button">Hide</button>
                            </div>
                            <div class="prjcs-table__scroll">
                                <table class="prjcs-table">
                                    <thead>
                                        <tr>
                                            <th>ID Number</th>
                                            <th>Date of Birth</th>
                                            <th>Gender</th>
                                            <th>Citizenship</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={sampleIds} for:item="s">
                                            <tr key={s.id} class="prjcs-table__row" data-id={s.id} onclick={handlePickSample}>
                                                <td class="prjcs-mono">{s.id}</td>
                                                <td>{s.dob}</td>
                                                <td>{s.gender}</td>
                                                <td>{s.citizenship}</td>
                                                <td class="prjcs-table__use">Check &rsaquo;</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- TAB 2 - VALIDATION & DECODE (US2) -->
            <template if:true={isTab2}>
                <div class="prjcs-pane">
                    <div class="prjcs-valid">
                        <lightning-icon icon-name="utility:check" variant="inverse" size="x-small"></lightning-icon>
                        <span>Valid South African ID number</span>
                    </div>
                    <div class="prjcs-grid3">
                        <div class="prjcs-tile">
                            <lightning-icon icon-name="utility:event" size="small" class="prjcs-tile__icon"></lightning-icon>
                            <p class="prjcs-tile__label">Date of Birth</p>
                            <p class="prjcs-tile__value">{dobDisplay}</p>
                        </div>
                        <div class="prjcs-tile">
                            <lightning-icon icon-name="utility:user" size="small" class="prjcs-tile__icon"></lightning-icon>
                            <p class="prjcs-tile__label">Gender</p>
                            <p class="prjcs-tile__value">{result.gender}</p>
                        </div>
                        <div class="prjcs-tile">
                            <lightning-icon icon-name="utility:identity" size="small" class="prjcs-tile__icon"></lightning-icon>
                            <p class="prjcs-tile__label">Citizenship</p>
                            <p class="prjcs-tile__value">{citizenshipLabel}</p>
                        </div>
                    </div>

                    <div class="prjcs-id-ai">
                    <div class="prjcs-idcard">
                        <span class="prjcs-idcard__strip"></span>
                        <div class="prjcs-idcard__head">
                            <svg class="prjcs-idcard__flag" viewBox="0 0 90 60" xmlns="http://www.w3.org/2000/svg" aria-label="Flag of South Africa" focusable="false">
                                <rect width="90" height="30" fill="#de3831"></rect>
                                <rect y="30" width="90" height="30" fill="#002395"></rect>
                                <polygon points="0,0 0,60 39,30" fill="#ffb915"></polygon>
                                <polygon points="0,8 0,52 30,30" fill="#000000"></polygon>
                                <path d="M90,30 L34,30 L0,0 M34,30 L0,60" fill="none" stroke="#ffffff" stroke-width="20" stroke-linejoin="round"></path>
                                <path d="M90,30 L34,30 L0,0 M34,30 L0,60" fill="none" stroke="#007a4d" stroke-width="12" stroke-linejoin="round"></path>
                            </svg>
                            <div class="prjcs-idcard__titles">
                                <p class="prjcs-idcard__country">Republic of South Africa</p>
                                <p class="prjcs-idcard__type">Identity Card</p>
                            </div>
                            <span class="prjcs-idcard__rsa">RSA</span>
                        </div>
                        <div class="prjcs-idcard__body">
                            <div class="prjcs-idcard__photo">
                                <lightning-icon icon-name="utility:lock" size="small" class="prjcs-idcard__lock"></lightning-icon>
                                <p class="prjcs-idcard__photonote">Photo hidden for privacy purposes</p>
                            </div>
                            <div class="prjcs-idcard__fields">
                                <div class="prjcs-idcard__field">
                                    <span class="prjcs-idcard__lbl">Identity Number</span>
                                    <span class="prjcs-idcard__val prjcs-mono">{result.idNumber}</span>
                                </div>
                                <div class="prjcs-idcard__field">
                                    <span class="prjcs-idcard__lbl">Date of Birth</span>
                                    <span class="prjcs-idcard__val">{dobDisplay}</span>
                                </div>
                                <div class="prjcs-idcard__field">
                                    <span class="prjcs-idcard__lbl">Sex</span>
                                    <span class="prjcs-idcard__val">{result.gender}</span>
                                </div>
                                <div class="prjcs-idcard__field">
                                    <span class="prjcs-idcard__lbl">Status</span>
                                    <span class="prjcs-idcard__val">{citizenshipLabel}</span>
                                </div>
                                <div class="prjcs-idcard__field">
                                    <span class="prjcs-idcard__lbl">Nationality</span>
                                    <span class="prjcs-idcard__val">South African</span>
                                </div>
                                <div class="prjcs-idcard__field">
                                    <span class="prjcs-idcard__lbl">Country of Birth</span>
                                    <span class="prjcs-idcard__val">South Africa</span>
                                </div>
                            </div>
                        </div>
                        <div class="prjcs-idcard__mrz">
                            <template for:each={mrzLines} for:item="m">
                                <span key={m.key} class="prjcs-idcard__mrzline">{m.text}</span>
                            </template>
                        </div>
                    </div>

                    <div class="prjcs-ai">
                        <div class="prjcs-ai__bar">
                            <span class="prjcs-ai__spark">
                                <svg class="prjcs-ai__sparksvg" viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="currentColor"></path></svg>
                            </span>
                            <span class="prjcs-ai__spacer"></span>
                            <select class="prjcs-ai__lang" onchange={handleLang}>
                                <option value="English">English</option>
                                <option value="isiZulu">isiZulu</option>
                                <option value="Afrikaans">Afrikaans</option>
                                <option value="Sesotho">Sesotho</option>
                                <option value="isiXhosa">isiXhosa</option>
                            </select>
                            <button class="prjcs-ai__btn" data-action="summary" onclick={handleAi} disabled={isAiLoading} type="button">
                                <svg class="prjcs-ai__btnstar" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="currentColor"></path></svg>
                                Insights
                            </button>
                            <button class="prjcs-ai__btn" data-action="longweekend" onclick={handleAi} disabled={isAiLoading} type="button"><svg class="prjcs-ai__btnstar" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="currentColor"></path></svg>Long weekends</button>
                        </div>
                        <template if:true={isAiLoading}>
                            <div class="prjcs-ai__skeleton"></div>
                        </template>
                        <template if:true={aiSummary}>
                            <lightning-formatted-rich-text value={aiSummaryHtml} class="prjcs-ai__text"></lightning-formatted-rich-text>
                        </template>
                    </div>
                    </div>
                </div>
            </template>

            <!-- TAB 3 - SAVED RECORD (US3) -->
            <template if:true={isTab3}>
                <div class="prjcs-pane">
                    <div class="prjcs-record">
                        <div class="prjcs-record__main">
                            <p class="prjcs-tile__label">ID Number &middot; unique key</p>
                            <p class="prjcs-record__id">{result.idNumber}</p>
                            <p class="prjcs-tile__label prjcs-record__sublabel">Last searched</p>
                            <p class="prjcs-record__time">
                                <lightning-formatted-date-time value={lastSearchedDisplay}
                                    year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit">
                                </lightning-formatted-date-time>
                            </p>
                        </div>
                        <div class="prjcs-counter">
                            <p class="prjcs-counter__label">Times searched</p>
                            <p class="prjcs-counter__value">{result.searchCount}</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- TAB 4 - HOLIDAYS (US4) -->
            <template if:true={isTab4}>
                <div class="prjcs-pane">
                    <div class="prjcs-h4head">
                        <h2 class="prjcs-h4title">Public &amp; banking holidays &middot; {result.holidayYear}</h2>
                        <span class="prjcs-pill">{holidayCountLabel}</span>
                    </div>

                    <template if:true={holidayWarning}>
                        <p class="prjcs-msg prjcs-msg_warn">
                            <lightning-icon icon-name="utility:warning" size="xx-small"></lightning-icon>
                            {holidayWarning}
                        </p>
                    </template>

                    <template if:true={hasHolidays}>
                        <ul class="prjcs-holidays">
                            <template for:each={holidays} for:item="h">
                                <li key={h.id} class="prjcs-holiday">
                                    <div class="prjcs-cal">
                                        <span class="prjcs-cal__mon">{h.mon}</span>
                                        <span class="prjcs-cal__day">{h.day}</span>
                                    </div>
                                    <div class="prjcs-holiday__body">
                                        <p class="prjcs-holiday__name">{h.name}</p>
                                        <p class="prjcs-holiday__date">{h.fullDate}</p>
                                    </div>
                                    <span class="prjcs-tag">{h.holidayType}</span>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template if:false={hasHolidays}>
                        <p class="prjcs-empty">No holidays were returned for {result.holidayYear}.</p>
                    </template>
                </div>
            </template>
        </section>
    </div>
</template>
